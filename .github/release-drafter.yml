categories:
  - title: "🌱 New Contributors"
    labels:
      - "first-time-contributor"
  - title: "🚀 Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "🐛 Bug Fixes"
    labels:
      - "fix"
      - "bugfix"
      - "bug"
  - title: "📚 Documentation"
    labels:
      - "documentation"
  - title: "🧰 Maintenance"
    labels:
      - "chore"
  - title: "⬆️ Dependencies"
    labels:
      - "dependencies"
change-title-escapes: '\<*_&`'
commitish: main

autolabeler:
  - label: "documentation"
    branch:
      - '/docs{0,1}\/.+/'
  - label: "bugfix"
    branch:
      - '/bugfix\/.+/'
  - label: "feature"
    branch:
      - '/feature\/.+/'
  - label: "dependencies"
    branch:
      - '/dependabot\/.+/'

template: |
  ## What's Changed

  $CHANGES

  ## Contributors

  $CONTRIBUTORS
